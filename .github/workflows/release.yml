name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0). Leave blank to use packages/cardartpicker/package.json version.'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve tag
        id: ver
        env:
          EVENT: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ -n "$INPUT_TAG" ]; then
              TAG="$INPUT_TAG"
            else
              VERSION=$(node -p "require('./packages/cardartpicker/package.json').version")
              TAG="v$VERSION"
            fi
          else
            TAG="$REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter cardartpicker build
      - run: pnpm --filter cardartpicker test

      - name: Pack tarball
        working-directory: packages/cardartpicker
        run: pnpm pack --pack-destination ${{ github.workspace }}

      # Trusted publishing (OIDC): requires the GitHub Actions trusted publisher
      # configured on npmjs.com for this package (repo cucapcosta/CardArtPicker,
      # workflow release.yml). Provenance is generated automatically; no token.
      # npm >= 11.5.1 is needed for OIDC — node 22 bundles an older npm.
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm (trusted publishing)
        working-directory: packages/cardartpicker
        run: npm publish --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --target "${{ github.sha }}" \
            --generate-notes \
            ./cardartpicker-*.tgz
